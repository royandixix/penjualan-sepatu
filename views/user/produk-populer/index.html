<main class="container-fluid py-4 px-md-5">

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <nav class="breadcrumb-custom mb-2 d-none d-md-block text-muted small">
                HOME / PRODUCT / <span class="active fw-bold text-dark">SALES</span>
            </nav>
            <h3 class="fw-bold mb-0">Shop Sepatu</h3>
            <p class="text-muted small mb-0">Temukan koleksi populer terbaik untukmu</p>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-outline-dark d-lg-none btn-sm fw-bold px-3"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasFilter">
                FILTER
            </button>

            <select class="form-select form-select-sm border-dark shadow-none" style="width:auto;">
                <option>Terbaru</option>
                <option>Harga: Rendah ke Tinggi</option>
                <option>Harga: Tinggi ke Rendah</option>
            </select>
        </div>
    </div>

    <div class="row">

        <!-- SIDEBAR FILTER -->
        <aside class="col-lg-2 d-none d-lg-block border-end pe-4">
            <h6 class="fw-bold mb-3">FILTER</h6>
            <div ng-include="'views/user/produk-populer/filter-content.html'"></div>
        </aside>

        <!-- PRODUK -->
        <section class="col-lg-10 ps-lg-4">
            <div class="row g-3 g-md-4">

                <div class="col-6 col-md-4 col-lg-3"
                     ng-repeat="item in produkPopuler | filter:filterProdukPopuler">

                    <div class="h-100 d-flex flex-column bg-white"
                         ng-click="goToCheckout(item.id)"
                         style="cursor:pointer;">

                        <!-- IMAGE -->
                        <div class="position-relative overflow-hidden rounded-3 mb-3">
                            <img ng-src="{{item.image}}"
                                 class="w-100 object-fit-cover shadow-sm"
                                 style="height:220px;">

                            <span class="position-absolute top-0 start-0 m-2 badge bg-warning text-dark fw-bold">
                                POPULER
                            </span>
                        </div>

                        <!-- CONTENT -->
                        <div class="d-flex flex-column flex-grow-1">

                            <h6 class="fw-bold mb-1 text-truncate">
                                {{item.name}}
                            </h6>

                            <small class="text-muted mb-2">
                                {{item.brand}}
                            </small>

                            <!-- 🔥 DESKRIPSI -->
                            <p class="text-muted small flex-grow-1 mb-2"
                               style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
                                {{item.description}}
                            </p>

                            <div class="fw-bold text-dark mb-3">
                                Rp {{item.price | number}}
                            </div>

                            <!-- BUTTON -->
                            <button class="btn btn-dark btn-sm w-100 py-2 fw-bold"
                                    ng-click="$event.stopPropagation(); addToCart(item)">
                                Tambah
                            </button>

                        </div>

                    </div>

                </div>

            </div>
        </section>

    </div>
</main>

<!-- OFFCANVAS FILTER (HP) -->
<div class="offcanvas offcanvas-bottom h-75" id="offcanvasFilter">
    <div class="offcanvas-header border-bottom">
        <h5 class="fw-bold">Filter Produk</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
        <div ng-include="'views/user/produk-populer/filter-content.html'"></div>

        <div class="d-grid gap-2 mt-4">
            <button class="btn btn-dark" data-bs-dismiss="offcanvas">
                TERAPKAN
            </button>

            <button class="btn btn-link text-muted"
                    ng-click="resetFilter()"
                    data-bs-dismiss="offcanvas">
                Hapus Filter
            </button>
        </div>
    </div>
</div>
