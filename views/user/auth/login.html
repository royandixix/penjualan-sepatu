<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-white" ng-controller="LoginController">
    <div class="row w-100 align-items-center justify-content-center" style="max-width: 1100px;">
        
        <div class="col-md-6 d-none d-md-flex flex-column align-items-center justify-content-center text-center p-5">
            <!-- <img src="images/undraw_order-coffee_pw24.png" alt="Illustration" class="img-fluid" style="max-width: 420px;"> -->
            <img src="public/images/undraw_order-coffee_pw24.png" alt="Illustration" class="img-fluid" style="max-width: 420px;">
            
            <h5 class="fw-bold mt-4 mb-1">What are you waiting for?</h5>
            <p class="text-muted small">Immerse yourself in the latest trend in fashion</p>
        </div>

        <div class="col-md-6 d-flex align-items-center justify-content-center p-4">
            <div class="w-100" style="max-width: 400px;">
                <h2 class="fw-bold mb-1" style="font-size: 1.8rem;">Selamat Datang!</h2>
                <p class="text-muted mb-4 small">
                    Masuk dulu yuk sebelum belanja!<br>
                    Tambahin produk ke keranjang, bisa checkout kapan aja!
                </p>

                <form ng-submit="login()">
                    <div class="mb-3">
                        <input type="email" 
                               class="form-control custom-input" 
                               placeholder="Masukan email / nomor whatsapp" 
                               ng-model="user.email" 
                               required>
                    </div>

                    <div class="mb-4">
                        <input type="password" 
                               class="form-control custom-input" 
                               placeholder="Masukan password" 
                               ng-model="user.password" 
                               required>
                    </div>
                    
                    <button type="submit" class="btn btn-login-807 w-100">
                        Lanjutkan
                    </button>

                    <p class="text-center mt-4 text-muted small">
                        Belum punya akun? 
                        <a href="#/register" class="text-decoration-none fw-bold" style="color: #0b7543;">Daftar Sekarang</a>
                    </p>
                </form>
            </div>
        </div>

    </div>

    

    <a href="#" class="wa-float shadow-sm">
        <span class="wa-label">Fast Respon 24/7 ⚡</span>
        <div class="wa-circle">
            <i class="fab fa-whatsapp"></i>
        </div>
    </a>
</div>
